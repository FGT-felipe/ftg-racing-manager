<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Be a racing legend with FTG Racing Manager 2026">
  <meta name="google-signin-client_id"
    content="822361821036-s5k1q9u89ks6tdu5cj0nef38dtcvlqqp.apps.googleusercontent.com">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="FTG Racing Manager 2026">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>FTG Racing Manager 2026</title>
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <div id="loading-indicator" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #555; display: flex; align-items: center; justify-content: center; font-family: sans-serif; z-index: 9999;">
    <div>
      <div style="text-align: center; margin-bottom: 20px;">FTG MANAGER 2026</div>
      <div style="font-size: 10px; color: #333;">Iniciando Engine de Flutter...</div>
    </div>
  </div>

  <script>
    // EMERGENCY: Clear all service workers to avoid migration conflicts
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister();
          console.log("SERVICE_WORKER: Unregistered old worker");
        }
      });
    }

    // Hide indicator when Flutter starts painting
    window.addEventListener('flutter-first-frame', function() {
      var indicator = document.getElementById('loading-indicator');
      if (indicator) indicator.style.display = 'none';
      console.log("FLUTTER: First frame painted");
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
